# golangci-lint v2 config (guidelines §25). The v2 default set already enables
# errcheck/govet/ineffassign/staticcheck/unused; we add revive/misspell/unconvert
# on top and run gofmt/goimports as formatters. CI gates only *new* issues
# (only-new-issues) so pre-existing debt doesn't block; run `golangci-lint run`
# locally for the full picture. Regenerate via `golangci-lint migrate` if bumping.
version: "2"
linters:
  enable:
    - misspell
    - revive
    - unconvert
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - revive
          - staticcheck
        path: \.pb\.go$
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
