name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# One CI run per ref; cancel superseded runs to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # gofmt is authoritative (guidelines); .pb.go is generated and exempt.
      - name: gofmt
        run: |
          unformatted="$(gofmt -l . | grep -v '\.pb\.go$' || true)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed on:"; echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      # Race detector + coverage. Integration tests are behind the `integration`
      # build tag (need Postgres) and are intentionally excluded here.
      - name: Test
        run: go test -race -cover ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # only-new-issues: gate quality on new/changed code without blocking on the
      # pre-existing lint debt. Run `golangci-lint run` locally for the full set.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          only-new-issues: true

  govulncheck:
    name: Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  docker:
    name: Docker build (${{ matrix.svc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        svc: [tmserver, dbserver, binserver, webserver]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the production image the same way Railway does (parameterized by
      # SVC); catches Dockerfile/.dockerignore regressions — e.g. the Release/
      # content tree tmserver bakes in. No push: this is a build smoke test.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: SVC=${{ matrix.svc }}
          push: false
          tags: w2pp-${{ matrix.svc }}:ci
          cache-from: type=gha,scope=${{ matrix.svc }}
          cache-to: type=gha,mode=max,scope=${{ matrix.svc }}
