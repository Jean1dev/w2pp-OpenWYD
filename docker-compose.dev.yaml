# Dev topology — hot-reload of tmServer against a Postgres (guidelines §4.4).
# For the full multi-service stack use docker-compose.yaml.
services:
  tmserver:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app                 # hot reload of source
      - go-cache:/go/pkg/mod   # module cache
    depends_on:
      db:
        condition: service_healthy
    command: ["go", "run", "./tmserver/cmd/tmserver"]
    ports:
      - "8281:8281"            # TMSrv client port (config-ops topology)
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
volumes:
  go-cache:
